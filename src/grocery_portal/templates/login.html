{% extends "base.html" %}

{% block title %}
Staff Login - Online Grocery Internal Portal
{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Staff Login</h4>
            </div>

            <div class="card-body">
                <form method="POST" action="{{ url_for('main.login') }}">

                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input
                            type="text"
                            class="form-control"
                            id="username"
                            name="username"
                            value="{{ request.form.get('username', '') }}"
                            autocomplete="username"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input
                            type="password"
                            class="form-control"
                            id="password"
                            name="password"
                            autocomplete="current-password"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-success w-100">
                        Login
                    </button>

                </form>
            </div>
        </div>

        <div class="text-muted text-center mt-3 small">
            <p class="mb-1">
                Cashier account:
                <strong>employee1</strong> /
                <strong>password123</strong>
            </p>

            <p class="mb-0">
                Manager account:
                <strong>manager1</strong> /
                <strong>admin123</strong>
            </p>
        </div>

    </div>
</div>

{% endblock %}
