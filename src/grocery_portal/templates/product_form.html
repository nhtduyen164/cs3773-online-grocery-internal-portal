{% extends "base.html" %}

{% block content %}

<h1>{{ form_type }} Product</h1>

<form method="POST" class="mt-4">

    <div class="mb-3">
        <label for="name" class="form-label">Product Name</label>
        <input
            type="text"
            class="form-control"
            id="name"
            name="name"
            value="{{ product['name'] if product else '' }}"
            required
        >
    </div>

    <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea
            class="form-control"
            id="description"
            name="description"
            rows="3"
        >{{ product['description'] if product else '' }}</textarea>
    </div>

    <div class="mb-3">
        <label for="image" class="form-label">Image File Name or URL</label>
        <input
            type="text"
            class="form-control"
            id="image"
            name="image"
            value="{{ product['image'] if product else '' }}"
            placeholder="example: apples.jpg"
        >
    </div>

    <div class="mb-3">
        <label for="price" class="form-label">Price</label>
        <input
            type="number"
            step="0.01"
            min="0"
            class="form-control"
            id="price"
            name="price"
            value="{{ product['price'] if product else '' }}"
            required
        >
    </div>

    <div class="mb-3">
        <label for="stock_quantity" class="form-label">Quantity</label>
        <input
            type="number"
            min="0"
            class="form-control"
            id="stock_quantity"
            name="stock_quantity"
            value="{{ product['stock_quantity'] if product else '' }}"
            required
        >
    </div>

    <div class="mb-3">
        <label for="status" class="form-label">Status</label>
        <select class="form-select" id="status" name="status">
            <option value="Available"
                {% if product and product['status'] == "Available" %}selected{% endif %}
            >
                Available
            </option>

            <option value="Out of Stock"
                {% if product and product['status'] == "Out of Stock" %}selected{% endif %}
            >
                Out of Stock
            </option>

            <option value="Discontinued"
                {% if product and product['status'] == "Discontinued" %}selected{% endif %}
            >
                Discontinued
            </option>
        </select>
    </div>

    <button type="submit" class="btn btn-success">
        Save Product
    </button>

    <a href="{{ url_for('main.products') }}" class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
