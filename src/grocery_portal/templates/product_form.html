{% extends "base.html" %}

{% block content %}

<h1>{{ form_type }} Product</h1>

<form method="POST" class="mt-4">

    <div class="mb-3">
        <label for="name" class="form-label">Product Name</label>
        <input
            type="text"
            class="form-control"
            id="name"
            name="name"
            value="{{ request.form.get('name', product['name'] if product else '') }}"
            required
        >
    </div>

    <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea
            class="form-control"
            id="description"
            name="description"
            rows="3"
        >{{ request.form.get('description', product['description'] if product else '') }}</textarea>
    </div>

    <div class="mb-3">
        <label for="image_path" class="form-label">
            Image Path
        </label>

        <input
            type="text"
            class="form-control"
            id="image_path"
            name="image_path"
            value="{{ request.form.get('image_path', product['image_path'] if product else '') }}"
            placeholder="images/products/placeholder.png"
        >

        <div class="form-text">
            Enter a path relative to the static folder.
        </div>
    </div>

    <div class="mb-3">
        <label for="price" class="form-label">Price</label>
        <input
            type="number"
            step="0.01"
            min="0"
            class="form-control"
            id="price"
            name="price"
            value="{{ request.form.get('price', product['price'] if product else '') }}"
            required
        >
    </div>

    <div class="mb-3">
        <label for="stock_quantity" class="form-label">Quantity</label>
        <input
            type="number"
            min="0"
            class="form-control"
            id="stock_quantity"
            name="stock_quantity"
            value="{{ request.form.get('stock_quantity', product['stock_quantity'] if product else '') }}"
            required
        >
    </div>

    <button type="submit" class="btn btn-success">
        Save Product
    </button>

    <a href="{{ url_for('main.products') }}" class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
